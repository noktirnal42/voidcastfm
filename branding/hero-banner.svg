<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08080f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1f;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00f5ff;stop-opacity:0" />
    </radialGradient>
    
    <!-- Glow filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Strong glow -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#heroGradient)"/>
  
  <!-- Mesh gradient overlay -->
  <circle cx="300" cy="200" r="400" fill="url(#glowGradient)" opacity="0.4"/>
  <circle cx="900" cy="400" r="500" fill="url(#glowGradient)" opacity="0.3"/>
  <circle cx="600" cy="300" r="300" fill="url(#glowGradient)" opacity="0.2"/>
  
  <!-- Grid lines -->
  <g stroke="#00f5ff" stroke-width="1" opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>
  
  <!-- Radio wave pattern -->
  <g fill="none" stroke="url(#cyanGradient)" stroke-width="3" filter="url(#neonGlow)" opacity="0.6">
    <path d="M 0 300 Q 150 250 300 300 T 600 300 T 900 300 T 1200 300"/>
    <path d="M 0 320 Q 150 270 300 320 T 600 320 T 900 320 T 1200 320" opacity="0.4"/>
    <path d="M 0 280 Q 150 230 300 280 T 600 280 T 900 280 T 1200 280" opacity="0.3"/>
  </g>
  
  <!-- Central logo placeholder -->
  <circle cx="600" cy="280" r="100" fill="#08080f" stroke="url(#cyanGradient)" stroke-width="3" filter="url(#strongGlow)"/>
  
  <!-- Inner rings -->
  <circle cx="600" cy="280" r="80" fill="none" stroke="url(#cyanGradient)" stroke-width="2" opacity="0.5"/>
  <circle cx="600" cy="280" r="60" fill="none" stroke="url(#cyanGradient)" stroke-width="1" opacity="0.3"/>
  
  <!-- Center dot -->
  <circle cx="600" cy="280" r="15" fill="url(#cyanGradient)" filter="url(#neonGlow)"/>
  
  <!-- Title Text -->
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="72" font-weight="bold" 
        fill="url(#cyanGradient)" text-anchor="middle" filter="url(#neonGlow)" letter-spacing="4">VOIDCAST</text>
  
  <!-- Subtitle -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="24" fill="#8b5cf6" 
        text-anchor="middle" letter-spacing="8">FM</text>
  
  <!-- Tagline -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="16" fill="#00f5ff" 
        text-anchor="middle" opacity="0.7" letter-spacing="2">PROFESSIONAL SDR TRANSMITTER CONTROL</text>
  
  <!-- Corner decorations -->
  <g stroke="url(#cyanGradient)" stroke-width="2" opacity="0.6" filter="url(#neonGlow)">
    <!-- Top left -->
    <path d="M 40 40 L 120 40 M 40 40 L 40 120" stroke-linecap="round"/>
    <!-- Top right -->
    <path d="M 1160 40 L 1080 40 M 1160 40 L 1160 120" stroke-linecap="round"/>
    <!-- Bottom left -->
    <path d="M 40 560 L 120 560 M 40 560 L 40 480" stroke-linecap="round"/>
    <!-- Bottom right -->
    <path d="M 1160 560 L 1080 560 M 1160 560 L 1160 480" stroke-linecap="round"/>
  </g>
  
  <!-- Animated dots -->
  <g fill="#00f5ff" filter="url(#neonGlow)">
    <circle cx="200" cy="150" r="3" opacity="0.8"/>
    <circle cx="1000" cy="150" r="3" opacity="0.6"/>
    <circle cx="300" cy="450" r="3" opacity="0.7"/>
    <circle cx="900" cy="450" r="3" opacity="0.5"/>
  </g>
</svg>
