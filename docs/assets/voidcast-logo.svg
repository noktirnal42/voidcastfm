<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="voidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00f5ff;stop-opacity:0.4" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Outer glow -->
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle with gradient -->
  <circle cx="200" cy="200" r="190" fill="#08080f" stroke="url(#voidGradient)" stroke-width="3"/>
  
  <!-- Outer ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#voidGradient)" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="url(#voidGradient)" stroke-width="1" opacity="0.2"/>
  
  <!-- Radio waves emanating from center -->
  <g filter="url(#glow)">
    <!-- Wave 1 -->
    <path d="M 100 200 Q 150 150 200 200 T 300 200" 
          fill="none" stroke="url(#waveGradient)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    
    <!-- Wave 2 -->
    <path d="M 110 200 Q 155 160 200 200 T 290 200" 
          fill="none" stroke="url(#waveGradient)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Wave 3 -->
    <path d="M 120 200 Q 160 170 200 200 T 280 200" 
          fill="none" stroke="url(#waveGradient)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </g>
  
  <!-- Central void circle -->
  <circle cx="200" cy="200" r="60" fill="#08080f" stroke="url(#voidGradient)" stroke-width="3" filter="url(#outerGlow)"/>
  
  <!-- Inner glow ring -->
  <circle cx="200" cy="200" r="55" fill="none" stroke="url(#voidGradient)" stroke-width="1" opacity="0.5"/>
  
  <!-- Center dot -->
  <circle cx="200" cy="200" r="8" fill="url(#voidGradient)" filter="url(#glow)"/>
  
  <!-- Frequency lines -->
  <g stroke="url(#voidGradient)" stroke-width="2" opacity="0.4">
    <line x1="200" y1="50" x2="200" y2="80"/>
    <line x1="200" y1="320" x2="200" y2="350"/>
    <line x1="50" y1="200" x2="80" y2="200"/>
    <line x1="320" y1="200" x2="350" y2="200"/>
  </g>
  
  <!-- Corner accents -->
  <g stroke="url(#voidGradient)" stroke-width="2" opacity="0.6">
    <path d="M 60 100 L 80 100 L 80 120" fill="none"/>
    <path d="M 340 100 L 320 100 L 320 120" fill="none"/>
    <path d="M 60 300 L 80 300 L 80 280" fill="none"/>
    <path d="M 340 300 L 320 300 L 320 280" fill="none"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="365" font-family="Arial, sans-serif" font-size="24" font-weight="bold" 
        fill="url(#voidGradient)" text-anchor="middle" letter-spacing="2">VOIDCAST</text>
  <text x="200" y="385" font-family="Arial, sans-serif" font-size="14" fill="#8b5cf6" 
        text-anchor="middle" letter-spacing="4">FM</text>
</svg>
